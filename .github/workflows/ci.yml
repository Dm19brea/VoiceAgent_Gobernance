name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, type-check, tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://governance:governance@localhost:5432/governance
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: governance
          POSTGRES_PASSWORD: governance
          POSTGRES_DB: governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.10"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy src tests

      - name: Tests (pytest)
        run: uv run pytest
