services:
  api:
    build: ./backend
    ports:
      - "8000:8000"

  # Provisioned for later milestones (M1+); not wired into the app yet.
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance
      POSTGRES_DB: governance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
